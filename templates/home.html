<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake 2026</title>
    <!-- Google Fonts for retro/modern gaming feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030712;
            --panel-bg: rgba(17, 24, 39, 0.75);
            --border-neon: rgba(139, 92, 246, 0.3);
            --neon-cyan: #06b6d4;
            --neon-pink: #ec4899;
            --neon-purple: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 20% 20%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        /* Glassmorphism Panels */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-neon);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7), 
                        0 0 20px 0 rgba(139, 92, 246, 0.1);
        }

        /* HUD Header */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
            letter-spacing: 1px;
        }

        .ip-badge {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid var(--neon-purple);
            border-radius: 8px;
            padding: 4px 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: #c084fc;
            text-shadow: 0 0 5px rgba(192, 132, 252, 0.5);
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.2);
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }

        .score-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Game Board Area */
        .board-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            background: #000;
            border-radius: 16px;
            border: 2px solid rgba(6, 182, 212, 0.3);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
        }

        canvas {
            display: block;
            background-color: #070a13;
            border-radius: 10px;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 1;
        }

        /* Controller for Mobile/Touch */
        .controls-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 180px;
            height: 180px;
            margin: 15px auto 5px auto;
        }

        .ctrl-btn {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .ctrl-btn:active, .ctrl-btn:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
            transform: scale(0.95);
        }

        .ctrl-up { grid-column: 2; grid-row: 1; }
        .ctrl-left { grid-column: 1; grid-row: 2; }
        .ctrl-right { grid-column: 3; grid-row: 2; }
        .ctrl-down { grid-column: 2; grid-row: 3; }

        /* Game Over Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 7, 18, 0.9);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 20;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .restart-btn {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 100%);
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.6);
        }

        /* Footer Ticker */
        .footer {
            padding: 12px 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ticker-wrap {
            flex-grow: 1;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 5px 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .ticker {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 20s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate3d(100%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
        
        .footer-tag {
            color: var(--neon-cyan);
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Panel -->
        <div class="panel hud-header">
            <div class="game-title">NEON SNAKE</div>
            <div class="ip-badge">{{ ip }}</div>
        </div>

        <!-- Main Game Area -->
        <div class="panel">
            <div class="scoreboard">
                <div>
                    <div class="score-label">Score</div>
                    <div id="score" class="score-value">000</div>
                </div>
                <div>
                    <div class="score-label">High Score</div>
                    <div id="highScore" class="score-value">000</div>
                </div>
            </div>

            <div class="board-container">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                
                <!-- Game Over Overlay -->
                <div id="gameOverOverlay" class="overlay">
                    <h2>GAME OVER</h2>
                    <button id="restartBtn" class="restart-btn">PLAY AGAIN</button>
                </div>
            </div>

            <!-- Mobile Controls -->
            <div class="controls-container">
                <button class="ctrl-btn ctrl-up" onclick="changeDirection('UP')">▲</button>
                <button class="ctrl-btn ctrl-left" onclick="changeDirection('LEFT')">◀</button>
                <button class="ctrl-btn ctrl-right" onclick="changeDirection('RIGHT')">▶</button>
                <button class="ctrl-btn ctrl-down" onclick="changeDirection('DOWN')">▼</button>
            </div>
        </div>

        <!-- Footer / User Agent Info -->
        <div class="panel footer">
            <div class="footer-tag">AGENT:</div>
            <div class="ticker-wrap">
                <div class="ticker">{{ request.META.HTTP_USER_AGENT }}</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("highScore");
        const overlay = document.getElementById("gameOverOverlay");
        const restartBtn = document.getElementById("restartBtn");

        const grid = 20;
        let snake = [{ x: 160, y: 160 }, { x: 140, y: 160 }, { x: 120, y: 160 }];
        let direction = "RIGHT";
        let nextDirection = "RIGHT";
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        let gameInterval = null;
        const speed = 100; // ms per frame

        // Particles for neon eating effect
        let particles = [];

        highScoreEl.innerText = String(highScore).padStart(3, "0");

        // Web Audio Context for retro sound effects
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'eat') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'gameover') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.4);
                }
            } catch (e) {
                // Audio not supported or blocked
            }
        }

        // Initialize Game
        function initGame() {
            snake = [{ x: 160, y: 160 }, { x: 140, y: 160 }, { x: 120, y: 160 }];
            direction = "RIGHT";
            nextDirection = "RIGHT";
            score = 0;
            scoreEl.innerText = "000";
            overlay.classList.remove("active");
            spawnFood();
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, speed);
        }

        // Spawn food on random grid
        function spawnFood() {
            const maxX = (canvas.width / grid) - 1;
            const maxY = (canvas.height / grid) - 1;
            
            let onSnake;
            do {
                food.x = Math.floor(Math.random() * maxX + 1) * grid;
                food.y = Math.floor(Math.random() * maxY + 1) * grid;
                onSnake = snake.some(part => part.x === food.x && part.y === food.y);
            } while (onSnake);
        }

        // Direction Changer
        function changeDirection(newDir) {
            if (newDir === "LEFT" && direction !== "RIGHT") nextDirection = "LEFT";
            if (newDir === "RIGHT" && direction !== "LEFT") nextDirection = "RIGHT";
            if (newDir === "UP" && direction !== "DOWN") nextDirection = "UP";
            if (newDir === "DOWN" && direction !== "UP") nextDirection = "DOWN";
            // Touch sound trigger activation on first interaction
            getAudioContext();
        }

        // Key Listeners
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") changeDirection("UP");
            if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") changeDirection("DOWN");
            if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") changeDirection("LEFT");
            if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") changeDirection("RIGHT");
        });

        // Spawn particles
        function spawnParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x + grid/2,
                    y: y + grid/2,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 3 + 1,
                    alpha: 1,
                    decay: Math.random() * 0.05 + 0.02,
                    color: color
                });
            }
        }

        // Update particles
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // Draw particles
        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // Main game loop
        function gameLoop() {
            direction = nextDirection;
            
            // Calculate new head position
            const head = { x: snake[0].x, y: snake[0].y };
            if (direction === "LEFT") head.x -= grid;
            if (direction === "RIGHT") head.x += grid;
            if (direction === "UP") head.y -= grid;
            if (direction === "DOWN") head.y += grid;

            // Collision checks
            if (
                head.x < 0 || head.x >= canvas.width ||
                head.y < 0 || head.y >= canvas.height ||
                snake.some(part => part.x === head.x && part.y === head.y)
            ) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Food Check
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = String(score).padStart(3, "0");
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                    highScoreEl.innerText = String(highScore).padStart(3, "0");
                }
                playSound('eat');
                spawnParticles(food.x, food.y, '#ec4899');
                spawnFood();
            } else {
                snake.pop();
            }

            updateParticles();
            draw();
        }

        // Game Over
        function gameOver() {
            clearInterval(gameInterval);
            playSound('gameover');
            overlay.classList.add("active");
        }

        // Draw Canvas Frame
        function draw() {
            // Clear screen
            ctx.fillStyle = "#070a13";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid Lines (Subtle retro background)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += grid) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw Neon Food
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ec4899";
            ctx.fillStyle = "#ec4899";
            ctx.beginPath();
            ctx.arc(food.x + grid/2, food.y + grid/2, grid/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Draw Neon Snake
            snake.forEach((part, index) => {
                ctx.save();
                const color = index === 0 ? "#06b6d4" : "#8b5cf6";
                ctx.shadowBlur = index === 0 ? 15 : 8;
                ctx.shadowColor = color;
                ctx.fillStyle = color;
                
                // Head or body shape
                ctx.fillRect(part.x + 1, part.y + 1, grid - 2, grid - 2);
                ctx.restore();
            });

            // Draw particles
            drawParticles();
        }

        // Play/Restart listeners
        restartBtn.addEventListener("click", initGame);
        
        // Start game initially
        initGame();
    </script>
</body>
</html>
