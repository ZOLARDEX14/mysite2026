<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chopee - เพิ่มสินค้า</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d2d;
            --primary-hover: #f13c1c;
            --bg-color: #0d0f14;
            --panel-bg: rgba(25, 28, 36, 0.65);
            --border-color: rgba(255, 77, 45, 0.15);
            --text-color: #e4e6eb;
            --text-muted: #b0b3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h2 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-muted);
        }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: var(--text-color);
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background: var(--primary-hover);
        }
        .btn-back {
            display: block;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 15px;
            font-size: 14px;
        }
        .btn-back:hover {
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>เพิ่มสินค้าใหม่ (Create)</h2>
        <form>
            <div class="form-group">
                <label for="productName">ชื่อสินค้า</label>
                <input type="text" id="productName" placeholder="ระบุชื่อสินค้า...">
            </div>
            <div class="form-group">
                <label for="productPrice">ราคาสินค้า (บาท)</label>
                <input type="number" id="productPrice" placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="productStock">จำนวนสต็อก</label>
                <input type="number" id="productStock" placeholder="0">
            </div>
            <div class="form-group">
                <label for="productDesc">รายละเอียดสินค้า</label>
                <textarea id="productDesc" rows="3" placeholder="ระบุข้อมูลสินค้า..."></textarea>
            </div>
            <button type="button" class="btn-submit" onclick="alert('บันทึกข้อมูลเรียบร้อย (ระบบจำลอง)')">บันทึกข้อมูล</button>
        </form>
        <a href="../../" class="btn-back">⬅️ ย้อนกลับหน้าแรก</a>
    </div>
</body>
</html>
