<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chopee - ลบสินค้า</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d2d;
            --primary-hover: #f13c1c;
            --bg-color: #0d0f14;
            --panel-bg: rgba(25, 28, 36, 0.65);
            --border-color: rgba(255, 77, 45, 0.15);
            --text-color: #e4e6eb;
            --text-muted: #b0b3b8;
            --danger: #ff4d4f;
            --danger-hover: #ff7875;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h2 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
        }
        .product-list {
            margin-top: 15px;
        }
        .product-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .product-info p { font-size: 13px; color: var(--text-muted); }
        .btn-delete {
            padding: 8px 15px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .btn-delete:hover { background: var(--danger-hover); }
        .btn-back {
            display: block;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 20px;
            font-size: 14px;
        }
        .btn-back:hover { color: var(--text-color); }
    </style>
</head>
<body>
    <div class="container">
        <h2>ลบข้อมูลสินค้า (Delete)</h2>
        <div class="product-list">
            <div class="product-item">
                <div class="product-info">
                    <h3>Wireless Gaming Headphones</h3>
                    <p>ราคา: ฿1,290.00 | คงเหลือ: 45 ชิ้น</p>
                </div>
                <button class="btn-delete" onclick="if(confirm('ต้องการลบสินค้านี้จริงหรือไม่?')) alert('ลบสินค้าเรียบร้อย (ระบบจำลอง)')">ลบสินค้า</button>
            </div>
            <div class="product-item">
                <div class="product-info">
                    <h3>Mechanical Keyboard</h3>
                    <p>ราคา: ฿1,890.00 | คงเหลือ: 20 ชิ้น</p>
                </div>
                <button class="btn-delete" onclick="if(confirm('ต้องการลบสินค้านี้จริงหรือไม่?')) alert('ลบสินค้าเรียบร้อย (ระบบจำลอง)')">ลบสินค้า</button>
            </div>
        </div>
        <a href="../../" class="btn-back">⬅️ ย้อนกลับหน้าแรก</a>
    </div>
</body>
</html>
