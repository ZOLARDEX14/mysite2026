<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chopee - หน้าหลัก</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Outfit:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d2d;
            --primary-hover: #f13c1c;
            --bg-color: #0d0f14;
            --panel-bg: rgba(25, 28, 36, 0.65);
            --border-color: rgba(255, 77, 45, 0.15);
            --text-color: #e4e6eb;
            --text-muted: #b0b3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            font-family: 'Orbitron', 'Sarabun', sans-serif;
            font-weight: 900;
            color: var(--primary);
            font-size: 38px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 16px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .menu-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .menu-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 77, 45, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 77, 45, 0.1);
        }
        .menu-icon { font-size: 32px; }
        .menu-title { font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CHOPEE</h1>
        <p class="subtitle">ระบบจัดการฐานข้อมูลสินค้าของร้าน Chopee</p>
        <div class="menu-grid">
            <a href="product/create" class="menu-card">
                <span class="menu-icon">➕</span>
                <span class="menu-title">เพิ่มสินค้า (Create)</span>
            </a>
            <a href="product/retrieve" class="menu-card">
                <span class="menu-icon">🔍</span>
                <span class="menu-title">ค้นหาสินค้า (Retrieve)</span>
            </a>
            <a href="product/update" class="menu-card">
                <span class="menu-icon">✏️</span>
                <span class="menu-title">แก้ไขสินค้า (Update)</span>
            </a>
            <a href="product/delete" class="menu-card">
                <span class="menu-icon">❌</span>
                <span class="menu-title">ลบสินค้า (Delete)</span>
            </a>
        </div>
    </div>
</body>
</html>
