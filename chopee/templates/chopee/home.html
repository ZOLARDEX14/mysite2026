<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Chopee - Product List</title>
</head>
<body>

    <!-- 1. ส่วนหัวข้อของหน้าเว็บ -->
    HOME<br>

    <!-- 2. เมนูนำทาง (Navigation) ไปยังหน้า CRUD ต่าง ๆ -->
    Product:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href="/">List</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href="/product/create">Create</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href="/product/retrieve">Retrieve</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href="/product/update">Update</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href="/product/delete">Delete</a><br>

    <!-- 3. หัวข้อส่วนเนื้อหาหลัก -->
    Product - List<br>

    <!-- 4. ส่วนดึงรายการสินค้าจากตัวแปร products มาลูปแสดงผล -->
    {% for prod in products %}
        {{ prod.brand }}&nbsp;&nbsp;{{ prod.name }}&nbsp;&nbsp;{{ prod.price }}&nbsp;&nbsp;{{ prod.year }}<br>
    {% endfor %}

    <!-- 5. ส่วนท้ายหน้าเว็บ -->
    footer

</body>
</html>
