<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chopee - Product List</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d2d;
            --primary-hover: #e5391a;
            --bg-color: #f6f9fc;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --border-color: #e1e8ed;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-height: 500px;
        }
        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-color);
        }
        .nav-bar {
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }
        .nav-label {
            font-weight: 700;
            color: var(--text-muted);
        }
        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            transition: color 0.2s;
        }
        .nav-link:hover {
            color: var(--primary);
        }
        .nav-link.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .content-section {
            flex: 1;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
            color: var(--text-color);
        }
        .product-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        .product-item {
            padding: 14px 20px;
            background: #fafbfc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
        }
        .product-details {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .category-badge {
            background: rgba(255, 77, 45, 0.1);
            color: var(--primary);
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
        }
        .product-name {
            font-weight: 600;
        }
        .product-price {
            font-weight: 700;
            color: var(--primary);
        }
        .footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HOME Header -->
        <h1 class="header-title">HOME</h1>
        
        <!-- Product Nav Bar -->
        <nav class="nav-bar">
            <span class="nav-label">Product:</span>
            <a href="/" class="nav-link active">List</a>
            <a href="/product/create" class="nav-link">Create</a>
            <a href="/product/retrieve" class="nav-link">Retrieve</a>
            <a href="/product/update" class="nav-link">Update</a>
            <a href="/product/delete" class="nav-link">Delete</a>
        </nav>

        <!-- Main Content -->
        <div class="content-section">
            <h2 class="section-title">Product - List</h2>
            <ul class="product-list">
                {% for prod in products %}
                <li class="product-item">
                    <div class="product-details">
                        <span class="category-badge">{{ prod.category.name }}</span>
                        <span class="product-name">{{ prod.name }}</span>
                    </div>
                    <span class="product-price">{{ prod.price }}</span>
                </li>
                {% empty %}
                <li class="product-item" style="color: var(--text-muted); justify-content: center;">
                    ไม่มีสินค้าในฐานข้อมูล
                </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Footer -->
        <footer class="footer">
            footer
        </footer>
    </div>
</body>
</html>
